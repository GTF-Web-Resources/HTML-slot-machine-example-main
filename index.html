<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sloty Retro Cornfield</title>

    <!-- Press Start 2P font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

    <!-- Pixel arcade title -->
    <div class="title">SPIN TO WIN!</div>

    <!-- Main wrapper -->
    <div id="main-wrapper">

        <!-- Background layer -->
        <div class="background"></div>

        <!-- Corn stalks in foreground -->
        <div class="corn-left"></div>
        <div class="corn-right"></div>

        <!-- Slot machine wrapper -->
        <div class="slot-machine-wrapper">

            <!-- Slot machine sprite -->
            <img src="images/slot_machine.png" class="slot-machine-sprite" alt="Slot Machine">

            <!-- Functional slot screen overlay -->
            <div class="slot-screen-container">

                <!-- Window for reels -->
                <div class="window">
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                    <div class="outer-col"><div class="col"></div></div>
                </div>

                <!-- Spin button -->
                <input type="button" onclick="spin(this)" class="start-button" value="Spin"/>
            </div>

        </div>

    </div>

    <!-- Win overlay -->
    <div id="win-overlay"></div>

</body>
</html>
