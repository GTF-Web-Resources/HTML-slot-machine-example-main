<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sloty Retro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div id="main-wrapper">

    <!-- Background -->
    <div class="background"></div>

    <!-- Corn Stalks -->
    <div class="corn-left"></div>
    <div class="corn-right"></div>

    <!-- Title -->
    <div class="title">SPIN TO WIN!</div>

    <!-- Slot Machine Wrapper -->
    <div class="slot-machine-wrapper">

        <!-- Slot Machine Sprite -->
        <img src="images/slot_machine.png" alt="Slot Machine" class="slot-machine-sprite">

        <!-- Functional Slot Screen -->
        <div class="slot-screen-container">
            <div class="window">
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-col"><div class="col"></div></div>
            </div>
        </div>

        <!-- Spin Button -->
        <input type="button" onclick="spin(this)" class="start-button" value="Spin">

    </div>

</div>

<!-- Win Overlay -->
<div id="win-overlay"></div>

</body>
</html>
