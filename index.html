<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sloty Retro Cornfield</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

    <!-- Pixel-arcade title -->
    <div class="title">SPIN TO WIN!</div>

    <!-- Main wrapper -->
    <div id="main-wrapper">

        <!-- Background layer -->
        <div class="background"></div>

        <!-- Optional corn stalks in foreground -->
        <div class="corn-left"></div>
        <div class="corn-right"></div>

        <!-- Slot machine wrapper -->
        <div class="slot-machine-wrapper">

            <!-- Slot machine sprite -->
            <img src="images/slot_machine_sprite.png" class="slot-machine-sprite">

            <!-- Functional slot machine overlay -->
            <div class="slot-screen-container">
                <div class="window-border">
                    <div class="window">
                        <div class="outer-spacer"></div>
                        <div class="outer-col"><div class="col"></div></div>
                        <div class="outer-spacer"></div>
                        <div class="outer-col"><div class="col"></div></div>
                        <div class="outer-spacer"></div>
                        <div class="outer-col"><div class="col"></div></div>
                        <div class="outer-spacer"></div>
                        <div class="outer-col"><div class="col"></div></div>
                        <div class="outer-spacer"></div>
                        <div class="outer-col"><div class="col"></div></div>
                        <div class="outer-spacer"></div>
                    </div>
                </div>

                <!-- Spin button -->
                <input type="button" onclick="spin(this)" class="start-button" value="Spin"/>
            </div>

        </div>

    </div>

    <!-- Win overlay -->
    <div id="win-overlay"></div>

</body>
</html>
