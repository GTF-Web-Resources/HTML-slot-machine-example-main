<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sloty</title>
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
</head>
<body>

    <!-- Animated Title -->
    <div class="title">SPIN TO WIN!</div>

    <!-- Slot Machine Container -->
    <div id="container">
        <div class="window-border">
            <div class="window">
                <div class="outer-spacer"></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>
                <div class="outer-col"><div class="col"></div></div>
                <div class="outer-spacer"></div>
            </div>
        </div>

        <!-- Spin Button -->
        <input type="button" onclick="spin(this)" class="start-button" value="Spin"/>
    </div>

    <!-- Win Overlay (outside container for proper display) -->
    <div id="win-overlay"></div>

</body>
</html>
